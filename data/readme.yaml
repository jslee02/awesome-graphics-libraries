  - title: Rust
    content:
    - ''
    - name: three-d
      url: https://github.com/asny/three-d/
      description: An OpenGL/WebGL/OpenGL ES renderer in Rust which seeks to make graphics
        simple but still have the power to draw exactly what you want.
      github: asny/three-d
      _meta:
        stars: 1624
        last_commit: '2026-04-17'
        license: MIT
        language: Rust
    - name: wgpu
      url: https://wgpu.rs/
      description: is a cross-platform, safe, Rust graphics API. It runs natively
        on Vulkan, Metal, D3D12, D3D11, and OpenGLES; and on top of WebGPU/WebGL on
        wasm. The API is based on the WebGPU standard. It serves as the core of the
        WebGPU integration in Firefox, Servo, and Deno.
      github: gfx-rs/wgpu
      _meta:
        stars: 17109
        last_commit: '2026-05-08'
        license: Apache-2.0
        language: Rust
    - ''
